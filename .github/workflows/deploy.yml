# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      AWS_REGION: us-east-1
      CODEARTIFACT_DOMAIN: ipss
      CODEARTIFACT_DOMAIN_OWNER: '078183419290'
      CODEARTIFACT_REPOSITORY: maven-release

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Configure AWS credentials
      if: github.event_name == 'push'
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::078183419290:role/interpss-core-codeartifact-deploy-role
        aws-region: us-east-1
        
    - name: Configure Maven for CodeArtifact
      if: github.event_name == 'push'
      run: |
        CODEARTIFACT_AUTH_TOKEN="$(aws codeartifact get-authorization-token \
          --domain "$CODEARTIFACT_DOMAIN" \
          --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
          --query authorizationToken \
          --output text)"
        echo "::add-mask::$CODEARTIFACT_AUTH_TOKEN"

        CODEARTIFACT_URL="$(aws codeartifact get-repository-endpoint \
          --domain "$CODEARTIFACT_DOMAIN" \
          --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
          --repository "$CODEARTIFACT_REPOSITORY" \
          --format maven \
          --query repositoryEndpoint \
          --output text)"

        mkdir -p "$HOME/.m2"
        cat > "$HOME/.m2/settings.xml" <<EOF
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>codeartifact</id>
              <username>aws</username>
              <password>${CODEARTIFACT_AUTH_TOKEN}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>codeartifact</id>
              <repositories>
                <repository>
                  <id>codeartifact</id>
                  <url>${CODEARTIFACT_URL}</url>
                  <releases>
                    <enabled>true</enabled>
                  </releases>
                  <snapshots>
                    <enabled>false</enabled>
                  </snapshots>
                </repository>
              </repositories>
              <pluginRepositories>
                <pluginRepository>
                  <id>codeartifact</id>
                  <url>${CODEARTIFACT_URL}</url>
                  <releases>
                    <enabled>true</enabled>
                  </releases>
                  <snapshots>
                    <enabled>false</enabled>
                  </snapshots>
                </pluginRepository>
              </pluginRepositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>codeartifact</activeProfile>
          </activeProfiles>
        </settings>
        EOF

        echo "MAVEN_SETTINGS=$HOME/.m2/settings.xml" >> "$GITHUB_ENV"
    - name: Build with Maven
      if: github.event_name == 'push'
      run: mvn -s "$MAVEN_SETTINGS" -B package --file pom.xml

    - name: Deploy
      if: github.event_name == 'push'
      run: mvn -s "$MAVEN_SETTINGS" -B deploy -DskipTests --file pom.xml
